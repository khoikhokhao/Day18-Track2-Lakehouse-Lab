services:
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/lakehouse || true;
      mc mb -p local/bronze || true;
      mc mb -p local/silver || true;
      mc mb -p local/gold || true;
      exit 0;
      "

  spark:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: lakehouse-spark
    depends_on:
      - minio
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      JUPYTER_TOKEN: lakehouse
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ../:/workspace
    working_dir: /workspace
    command: >
      bash -c "
      pip install --quiet delta-spark==3.2.0 jupytext faker &&
      start-notebook.sh --NotebookApp.token=lakehouse --NotebookApp.notebook_dir=/workspace
      "

volumes:
  minio-data:
